name: Build and deploy ASP.Net Core app to Azure Web App - Qaro2a
on:
  push:
    branches:
      - master   # change to main if that's your default branch
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
     - name: Restore
  run: dotnet restore ECommerce.API/ECommerce.API.csproj
- name: Build
  run: dotnet build ECommerce.API/ECommerce.API.csproj --configuration Release --no-restore
- name: Publish
  run: dotnet publish ECommerce.API/ECommerce.API.csproj -c Release -o ${{ runner.temp }}/myapp
- name: Upload artifact
  uses: actions/upload-artifact@v4
  with:
    name: .net-app
    path: ${{ runner.temp }}/myapp
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'Qaro2a'
          slot-name: 'Production'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F7F48C89ED044388A849390D20EC93B9 }}
